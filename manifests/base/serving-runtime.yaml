# vLLM CPU ServingRuntime for KServe RawDeployment.
# Uses upstream vLLM OpenAI-compatible CPU image (x86_64).
# The built-in RHOAI vllm-cpu image only supports ppc64le/s390x.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-cpu-runtime
  namespace: super-slim-demo
  annotations:
    opendatahub.io/runtime-version: v0.17.1
    openshift.io/display-name: vLLM CPU ServingRuntime for KServe (x86_64)
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - name: kserve-container
      image: docker.io/vllm/vllm-openai-cpu:latest
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "4"
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
